<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow">
                    <div class="card-body">

                        <h1 class="mb-4 text-center">Bienvenido</h1>
                        <p class="mb-2"><strong>ID:</strong> <span th:text="${user.id}"></span></p>
                        <p class="mb-2"><strong>Nombre:</strong> <span th:text="${user.nombre}"></span></p>
                        <p class="mb-2"><strong>Usuario:</strong> <span th:text="${user.username}"></span></p>
                        <p class="mb-3"><strong>Correo:</strong> <span th:text="${user.correo}"></span></p>

                        <div class="d-grid">
                            <a href="/logout" class="btn btn-danger">Cerrar sesión</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
