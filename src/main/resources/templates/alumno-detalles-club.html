<!DOCTYPE html>
<html lang="es" data-theme="light" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Alumno Detalles del Club | Conecta ESCOM</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@3.7.3/dist/full.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">    
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        escom: {
                            main: '#0EA5E9',
                            dark: '#0369A1',
                            deep: '#1E293B',
                            soft: '#F8FAFC',
                            light: '#F1F5F9',
                            accent: '#64748B'
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    boxShadow: {
                        'soft': '0 10px 25px -5px rgba(0, 0, 0, 0.05)',
                        'card': '0 20px 50px -12px rgba(14, 165, 233, 0.08)'
                    },
                    borderRadius: { 'super': '1.5rem' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        
        i[class^="ph-"] {
            display: inline-block;
            line-height: 1;
            vertical-align: middle;
        }

        .card-hover-effect {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover-effect:hover {
            transform: translateY(-4px);
            background-color: white;
            border-color: #0EA5E9;
            box-shadow: 0 20px 25px -5px rgba(14, 165, 233, 0.1);
        }
        .glass-overlay {
            background: linear-gradient(180deg, rgba(30, 41, 59, 0) 0%, rgba(30, 41, 59, 0.8) 100%);
        }
    </style>
</head>
<body class="bg-escom-soft text-escom-deep min-h-screen selection:bg-escom-main selection:text-white antialiased">

    <div class="max-w-5xl mx-auto px-6 py-16">

        <!-- Imagen, Tipo y Nombre del Club -->
        <div class="relative rounded-super overflow-hidden shadow-2xl mb-12 group border-4 border-white">
            <img th:src="@{ '/' + ${club.rutaArchivoImagen} }" 
                class="w-full h-[420px] object-cover transition-transform duration-700 group-hover:scale-105"/>
            <div class="absolute inset-0 glass-overlay"></div>
            <div class="absolute bottom-8 left-8 text-white">
                <div class="flex gap-2 mb-4">
                    <span th:if="${club.tipo == 'Académico'}" 
                        class="px-4 py-1.5 rounded-full bg-blue-600 border-2 border-blue-400 text-white text-xs font-black uppercase tracking-widest shadow-[0_4px_14px_0_rgba(37,99,235,0.5)] leading-none">
                        Académico
                    </span>
                    <span th:if="${club.tipo == 'Deportivo'}" 
                        class="px-4 py-1.5 rounded-full bg-orange-500 border-2 border-orange-300 text-white text-xs font-black uppercase tracking-widest shadow-[0_4px_14px_0_rgba(249,115,22,0.5)] leading-none">
                        Deportivo
                    </span>
                    <span th:if="${club.tipo == 'Cultural'}" 
                        class="px-4 py-1.5 rounded-full bg-purple-600 border-2 border-purple-400 text-white text-xs font-black uppercase tracking-widest shadow-[0_4px_14px_0_rgba(147,51,234,0.5)] leading-none">
                        Cultural
                    </span>
                </div>
                <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight" th:text="${club.nombre}">Nombre del Club</h1>
            </div>
        </div>

        <!-- Información del Club -->
        <div class="bg-white rounded-super shadow-card p-8 md:p-12 space-y-12 border border-slate-100">

            <!-- Objetivo -->
            <div class="max-w-3xl">
                <h2 class="text-sm font-black uppercase tracking-[0.2em] mb-4 text-escom-main">Objetivo</h2>
                <p class="text-lg leading-relaxed text-escom-accent font-medium" th:text="${club.objetivo}">Descripción del objetivo...</p>
            </div>

            <div class="h-px bg-slate-100 w-full"></div>

            <!-- Datos del club -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

                <!-- Ubicación -->
                <div class="flex items-start gap-5 p-6 bg-slate-50 rounded-2xl border border-transparent card-hover-effect">
                    <div class="p-3 bg-white rounded-xl shadow-sm">
                        <i class="ph-fill ph-map-pin text-escom-main text-3xl"></i>
                    </div>
                    <div>
                        <p class="font-bold text-escom-deep text-sm mb-1 uppercase tracking-tighter">Ubicación</p>
                        <p class="text-escom-accent font-medium" th:text="${club.ubicacion}">Ubicación aquí</p>
                    </div>
                </div>

                <!-- Horario -->
                <div class="flex items-start gap-5 p-6 bg-slate-50 rounded-2xl border border-transparent card-hover-effect">
                    <div class="p-3 bg-white rounded-xl shadow-sm">
                        <i class="ph-fill ph-clock text-escom-main text-3xl"></i>
                    </div>
                    <div>
                        <p class="font-bold text-escom-deep text-sm mb-1 uppercase tracking-tighter">Horario</p>
                        <p class="text-escom-accent font-medium" th:text="${club.horario}">Horario aquí</p>
                    </div>
                </div>

                <!--Cantidad de Alumnos Inscritos -->
                <div class="flex items-start gap-5 p-6 bg-slate-50 rounded-2xl border border-transparent card-hover-effect">
                    <div class="p-3 bg-white rounded-xl shadow-sm">
                        <i class="ph-fill ph-users text-escom-main text-3xl"></i>
                    </div>
                    <div>
                        <p class="font-bold text-escom-deep text-sm mb-1 uppercase tracking-tighter">Comunidad</p>
                        <p class="text-escom-accent font-medium"><span th:text="${club.cantidadAlumnosInscritos}">0</span> Alumnos</p>
                    </div>
                </div>

                <!-- Coordinador -->
                <div class="flex items-start gap-5 p-6 bg-slate-50 rounded-2xl border border-transparent card-hover-effect">
                    <div class="p-3 bg-white rounded-xl shadow-sm">
                        <i class="ph-fill ph-chalkboard-teacher text-escom-main text-3xl"></i>
                    </div>
                    <div>
                        <p class="font-bold text-escom-deep text-sm mb-2 uppercase tracking-tighter">Coordinador</p>
                        <div class="flex items-center gap-3">

                            <!-- Mostrar foto de perfil del Coordinador si está asignada -->
                            <img th:if="${club.coordinadorClub?.rutaFotoPerfil != null and club.coordinadorClub?.rutaFotoPerfil != ''}"
                                th:src="@{ '/' + ${club.coordinadorClub.rutaFotoPerfil} }"
                                class="w-8 h-8 rounded-full ring-2 ring-escom-main/20"/>

                            <!-- Si no tiene una foto de perfil, mostramos un avatar generado -->
                            <img th:unless="${club.coordinadorClub?.rutaFotoPerfil != null and club.coordinadorClub?.rutaFotoPerfil != ''}"
                                th:src="'https://ui-avatars.com/api/?name=' + ${club.coordinadorClub?.nombre} + '&background=random'"
                                class="w-8 h-8 rounded-full ring-2 ring-escom-main/20"/>

                            <span class="text-escom-accent font-semibold text-sm" th:text="${club.coordinadorClub?.nombre}">Nombre</span>
                        </div>
                    </div>
                </div>

                <!-- Presidente -->
                <div class="flex items-start gap-5 p-6 bg-slate-50 rounded-2xl border border-transparent card-hover-effect">
                    <div class="p-3 bg-white rounded-xl shadow-sm">
                        <i class="ph-fill ph-medal text-escom-main text-3xl"></i>
                    </div>
                    <div>
                        <p class="font-bold text-escom-deep text-sm mb-1 uppercase tracking-tighter">Presidente</p>
                        <p class="text-escom-accent font-medium" th:text="${club.presidenteClub?.nombre}">Nombre</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
